<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob: 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; worker-src 'self' blob:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'"
    />
    <title>Kola</title>
    <link rel="stylesheet" href="assets/app.css" />
    <script src="assets/vendor/heic2any.min.js"></script>
  </head>
  <body class="h-screen overflow-hidden bg-slate-100 text-slate-900 antialiased">
    <main class="grid h-screen w-screen grid-cols-1 overflow-hidden lg:grid-cols-[minmax(0,1fr)_320px]">
      <section class="grid h-[42vh] min-h-0 place-items-center overflow-hidden border-b border-slate-200 bg-white/70 p-3 [background-image:linear-gradient(45deg,rgba(100,116,139,.07)_25%,transparent_25%),linear-gradient(-45deg,rgba(100,116,139,.07)_25%,transparent_25%),linear-gradient(45deg,transparent_75%,rgba(100,116,139,.07)_75%),linear-gradient(-45deg,transparent_75%,rgba(100,116,139,.07)_75%)] [background-position:0_0,0_8px,8px_-8px,-8px_0] [background-size:16px_16px] lg:h-screen lg:border-b-0 lg:border-r lg:p-5" aria-label="Náhled koláže">
        <div class="grid overflow-hidden bg-white p-2 shadow-[0_14px_44px_rgba(15,23,42,.14)]" id="collage" aria-live="polite"></div>
      </section>

      <aside class="h-[58vh] overflow-y-auto bg-transparent p-3 lg:h-screen" aria-label="Nastavení koláže">
        <div class="flex min-h-full flex-col gap-3 pb-3">
          <section class="grid gap-2 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex items-center justify-between gap-3">
              <h2 class="text-sm font-extrabold tracking-normal text-slate-900">Fotografie</h2>
              <button class="grid h-8 w-8 place-items-center rounded-md text-slate-500 transition hover:bg-slate-100 hover:text-slate-900" id="clearButton" type="button" aria-label="Vyčistit">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9.17 4a3 3 0 0 1 2.83-2h0a3 3 0 0 1 2.83 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M20 6H4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M18.33 9.5l-.52 7.75c-.2 2.98-.3 4.47-3.78 4.47H9.97c-3.48 0-3.58-1.49-3.78-4.47L5.67 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10 11v6M14 11v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <div class="overflow-hidden rounded-lg border border-slate-200" id="fileList" aria-label="Nahrání fotografií"></div>
          </section>

          <section class="grid gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="text-sm font-extrabold tracking-normal text-slate-900">Šablona</h2>
            <div class="grid grid-cols-2 gap-2" id="templateList">
              <button class="template-card grid min-h-[82px] gap-1.5 rounded-lg border border-slate-200 bg-white p-2 text-left transition hover:border-slate-500" type="button" data-template="grid-4">
                <span class="grid h-10 grid-cols-2 grid-rows-2 gap-1" aria-hidden="true">
                  <span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span>
                </span>
                <span class="text-xs font-bold text-slate-900">Čtyři pole</span>
              </button>
              <button class="template-card grid min-h-[82px] gap-1.5 rounded-lg border border-slate-200 bg-white p-2 text-left transition hover:border-slate-500" type="button" data-template="hero-left">
                <span class="grid h-10 grid-cols-[1.3fr_1fr] grid-rows-2 gap-1" aria-hidden="true">
                  <span class="row-span-2 rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span>
                </span>
                <span class="text-xs font-bold text-slate-900">Hlavní fotka</span>
              </button>
              <button class="template-card grid min-h-[82px] gap-1.5 rounded-lg border border-slate-200 bg-white p-2 text-left transition hover:border-slate-500" type="button" data-template="mosaic">
                <span class="grid h-10 grid-cols-3 grid-rows-3 gap-1" aria-hidden="true">
                  <span class="col-span-2 row-span-2 rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="col-span-2 rounded bg-slate-200"></span>
                </span>
                <span class="text-xs font-bold text-slate-900">Mozaika</span>
              </button>
              <button class="template-card grid min-h-[82px] gap-1.5 rounded-lg border border-slate-200 bg-white p-2 text-left transition hover:border-slate-500" type="button" data-template="stack">
                <span class="grid h-10 grid-rows-[1.2fr_.8fr_.8fr] gap-1" aria-hidden="true">
                  <span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span>
                </span>
                <span class="text-xs font-bold text-slate-900">Pásy</span>
              </button>
              <button class="template-card col-span-2 grid min-h-[74px] gap-1.5 rounded-lg border border-slate-700 bg-white p-2 text-left shadow-[0_0_0_2px_rgba(51,65,85,.14)] transition hover:border-slate-700" type="button" data-template="custom-grid">
                <span class="grid h-8 grid-cols-4 grid-rows-2 gap-1" aria-hidden="true">
                  <span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span><span class="rounded bg-slate-200"></span>
                </span>
                <span class="text-xs font-bold text-slate-900">Vlastní grid</span>
              </button>
            </div>
            <div class="grid grid-cols-2 gap-2 rounded-lg border border-slate-200 bg-slate-50 p-2" id="customGridControls">
              <label class="grid gap-1 text-xs font-bold text-slate-600">
                <span>Sloupce</span>
                <input class="min-h-8 rounded-md border border-slate-300 bg-white px-2 text-sm text-slate-900" id="customCols" type="number" min="1" max="6" value="3" />
              </label>
              <label class="grid gap-1 text-xs font-bold text-slate-600">
                <span>Řádky</span>
                <input class="min-h-8 rounded-md border border-slate-300 bg-white px-2 text-sm text-slate-900" id="customRows" type="number" min="1" max="6" value="3" />
              </label>
            </div>
          </section>

          <section class="grid gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="text-sm font-extrabold tracking-normal text-slate-900">Vzhled</h2>
            <label class="grid gap-1.5 text-xs font-bold text-slate-600">
              <span class="flex items-center justify-between"><span>Mezera</span><output id="gapValue">8 px</output></span>
              <input class="accent-slate-700" id="gapRange" type="range" min="0" max="22" value="8" />
            </label>
            <label class="grid gap-1.5 text-xs font-bold text-slate-600">
              <span class="flex items-center justify-between"><span>Zaoblení</span><output id="radiusValue">10 px</output></span>
              <input class="accent-slate-700" id="radiusRange" type="range" min="0" max="24" value="10" />
            </label>
            <label class="grid gap-1.5 text-xs font-bold text-slate-600">
              <span>Poměr stran</span>
              <select class="min-h-9 w-full rounded-md border border-slate-300 bg-white px-2 text-sm text-slate-900" id="ratioSelect">
                <option value="1 / 1">Čtverec</option>
                <option value="4 / 5">Portrét</option>
                <option value="16 / 9">Panorama</option>
                <option value="3 / 2">Krajina</option>
                <option value="photo">Podle fotek</option>
              </select>
            </label>
            <div class="grid grid-cols-2 gap-2">
              <label class="grid gap-1.5 text-xs font-bold text-slate-600">
                <span>Vodorovně</span>
                <select class="min-h-9 w-full rounded-md border border-slate-300 bg-white px-2 text-sm text-slate-900" id="alignXSelect">
                  <option value="left">Vlevo</option>
                  <option value="center" selected>Střed</option>
                  <option value="right">Vpravo</option>
                </select>
              </label>
              <label class="grid gap-1.5 text-xs font-bold text-slate-600">
                <span>Svisle</span>
                <select class="min-h-9 w-full rounded-md border border-slate-300 bg-white px-2 text-sm text-slate-900" id="alignYSelect">
                  <option value="top">Nahoru</option>
                  <option value="center" selected>Střed</option>
                  <option value="bottom">Dolů</option>
                </select>
              </label>
            </div>
          </section>

          <section class="mt-auto grid gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <h2 class="text-sm font-extrabold tracking-normal text-slate-900">Export</h2>
            <div class="grid grid-cols-[1fr_auto] gap-2">
              <div class="grid grid-cols-3 rounded-md border border-slate-300 bg-slate-100 p-0.5" id="exportScale" role="group" aria-label="Velikost exportu">
                <button class="export-scale rounded px-2 py-1.5 text-sm font-bold text-slate-600 transition" type="button" data-scale="1">1x</button>
                <button class="export-scale rounded bg-white px-2 py-1.5 text-sm font-bold text-slate-900 shadow-sm transition" type="button" data-scale="2">2x</button>
                <button class="export-scale rounded px-2 py-1.5 text-sm font-bold text-slate-600 transition" type="button" data-scale="4">4x</button>
              </div>
              <button class="inline-grid min-h-9 grid-cols-[auto_auto] items-center gap-2 rounded-md bg-slate-800 px-3 text-sm font-bold text-white transition hover:bg-slate-700" id="exportButton" type="button">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 15V3m0 12-4-4m4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M3 14c0 3.77 0 5.66 1.17 6.83C5.34 22 7.23 22 11 22h2c3.77 0 5.66 0 6.83-1.17C21 19.66 21 17.77 21 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span>Export</span>
              </button>
            </div>
          </section>
        </div>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
